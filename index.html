<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Time Companion | Your World Clock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; color: white; transition: background 2s ease; overflow-x: hidden; }
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px; }
        .dragging { opacity: 0.5; transform: scale(0.98); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
        .search-results::-webkit-scrollbar { width: 4px; }
        .search-results::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        .golden-window { background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="glass w-full max-w-lg p-6 md:p-10 shadow-2xl relative overflow-hidden">
        <!-- Brand Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black uppercase tracking-tighter mb-1">Time Companion</h1>
            <p class="text-[10px] font-black tracking-[0.4em] text-gray-500 uppercase">Made by Ruthwik Reddy</p>
        </div>

        <!-- Master IST Input -->
        <div class="mb-10 p-6 bg-white/[0.02] rounded-3xl border border-white/5">
            <div class="flex justify-between items-center mb-4">
                <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Your Local Time: India</span>
                <button id="sync-btn" class="text-[9px] font-black px-3 py-1 bg-white text-black rounded-full hover:bg-gray-200 transition">Sync Now</button>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-baseline gap-2">
                    <input id="h-in" type="number" value="10" class="w-20 bg-transparent text-5xl font-black focus:outline-none text-center">
                    <span class="text-3xl font-bold opacity-30">:</span>
                    <input id="m-in" type="number" value="30" class="w-20 bg-transparent text-5xl font-black focus:outline-none text-center">
                </div>
                <div class="flex-1 text-right">
                    <p id="ist-date" class="text-[10px] font-black text-gray-500 uppercase"></p>
                </div>
            </div>
        </div>

        <!-- Meeting Planner / Golden Window -->
        <div id="planner-box" class="golden-window p-4 rounded-2xl mb-8 hidden">
            <h4 class="text-[9px] font-black uppercase text-gray-400 mb-2">Perfect Meeting Time</h4>
            <p id="window-status" class="text-xs font-bold text-white"></p>
        </div>

        <!-- City List (Draggable) -->
        <div id="city-list" class="space-y-4 mb-8">
            <!-- Cards injected here -->
        </div>

        <!-- Advanced Search Input -->
        <div class="relative group mb-8">
            <input id="city-search" type="text" placeholder="Add a city... (try: New York, London, Tokyo)" 
                   class="w-full py-5 px-6 bg-white/[0.04] border border-white/10 rounded-2xl text-sm font-bold focus:outline-none focus:border-white/30 transition">
            <div id="search-results" class="search-results absolute bottom-full left-0 right-0 max-h-48 overflow-y-auto bg-[#111] border border-white/10 rounded-2xl mb-2 hidden z-50">
                <!-- Search suggestions -->
            </div>
        </div>

        <!-- Footer Actions -->
        <div class="flex justify-between items-center pt-8 border-t border-white/5">
            <div class="flex gap-4">
                <button onclick="exportCalendar()" class="text-[10px] font-black uppercase text-gray-400 hover:text-white transition">Save Calendar</button>
                <button onclick="clearAll()" class="text-[10px] font-black uppercase text-red-500 hover:text-red-400 transition">Clear All</button>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-[10px] font-black uppercase text-gray-600">24H Format</span>
                <button id="format-toggle" class="w-10 h-5 bg-white rounded-full flex items-center px-1">
                    <div id="toggle-circle" class="w-3 h-3 bg-black rounded-full transition-all translate-x-5"></div>
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- DATABASE & STATE ---
        const CITIES_DB = [
            { n: "London", c: "UK", tz: "Europe/London" },
            { n: "New York", c: "USA", tz: "America/New_York" },
            { n: "San Francisco", c: "USA", tz: "America/Los_Angeles" },
            { n: "Tokyo", c: "Japan", tz: "Asia/Tokyo" },
            { n: "Singapore", c: "Singapore", tz: "Asia/Singapore" },
            { n: "Dubai", c: "UAE", tz: "Asia/Dubai" },
            { n: "Sydney", c: "Australia", tz: "Australia/Sydney" },
            { n: "Paris", c: "France", tz: "Europe/Paris" },
            { n: "Berlin", c: "Germany", tz: "Europe/Berlin" },
            { n: "Moscow", c: "Russia", tz: "Europe/Moscow" },
            { n: "Cape Town", c: "South Africa", tz: "Africa/Johannesburg" },
            { n: "Toronto", c: "Canada", tz: "America/Toronto" },
            { n: "Seoul", c: "South Korea", tz: "Asia/Seoul" }
        ];

        let state = JSON.parse(localStorage.getItem('ruthwik_times')) || [
            { n: "New York", c: "USA", tz: "America/New_York" },
            { n: "London", c: "UK", tz: "Europe/London" },
            { n: "Tokyo", c: "Japan", tz: "Asia/Tokyo" }
        ];

        let is24h = true;
        const hIn = document.getElementById('h-in');
        const mIn = document.getElementById('m-in');
        const cityList = document.getElementById('city-list');
        const searchInput = document.getElementById('city-search');
        const searchResults = document.getElementById('search-results');

        // --- CORE LOGIC ---
        function render() {
            const baseH = parseInt(hIn.value) || 0;
            const baseM = parseInt(mIn.value) || 0;
            
            // IST is our base
            const now = new Date();
            const baseDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), baseH, baseM);
            document.getElementById('ist-date').innerText = baseDate.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

            cityList.innerHTML = '';
            state.forEach((city, idx) => {
                const targetTime = new Intl.DateTimeFormat('en-GB', {
                    timeZone: city.tz, hour: 'numeric', minute: 'numeric', day: 'numeric', month: 'short', weekday: 'short', hour12: !is24h
                }).formatToParts(baseDate);

                const getVal = (type) => targetTime.find(p => p.type === type).value;
                const hour24 = parseInt(new Intl.DateTimeFormat('en-GB', { timeZone: city.tz, hour: 'numeric', hour12: false }).format(baseDate));
                const isWorking = hour24 >= 9 && hour24 < 18;

                const card = document.createElement('div');
                card.className = "bg-white/[0.04] border border-white/5 rounded-3xl p-6 relative group cursor-grab active:cursor-grabbing transition hover:bg-white/[0.06]";
                card.draggable = true;
                card.dataset.index = idx;
                
                card.innerHTML = `
                    <button onclick="removeCity(${idx})" class="absolute top-6 right-6 text-gray-600 hover:text-white opacity-0 group-hover:opacity-100 transition">×</button>
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="font-black text-sm uppercase">${city.n}</h3>
                            <p class="text-[9px] font-bold text-gray-500 uppercase tracking-widest">${city.c}</p>
                        </div>
                        <span class="text-[8px] font-black px-2.5 py-1 rounded-lg ${isWorking ? 'bg-white text-black' : 'border border-white/20 text-gray-600'}">
                            ${isWorking ? 'Available' : 'After Hours'}
                        </span>
                    </div>
                    <div class="flex justify-between items-end">
                        <div class="text-3xl font-black tracking-tighter">
                            ${is24h ? getVal('hour').padStart(2, '0') : getVal('hour')}:${getVal('minute').padStart(2, '0')} <span class="text-xs uppercase">${!is24h ? getVal('dayPeriod') : ''}</span>
                        </div>
                        <div class="text-[9px] font-black text-gray-600 uppercase text-right">
                            ${getVal('weekday')}, ${getVal('day')} ${getVal('month')}
                        </div>
                    </div>
                `;
                
                card.addEventListener('dragstart', () => card.classList.add('dragging'));
                card.addEventListener('dragend', () => card.classList.remove('dragging'));
                cityList.appendChild(card);
            });

            updateTheme();
            checkGoldenWindow(baseDate);
            localStorage.setItem('ruthwik_times', JSON.stringify(state));
        }

        function checkGoldenWindow(baseDate) {
            const planner = document.getElementById('planner-box');
            if (state.length < 2) { planner.classList.add('hidden'); return; }

            planner.classList.remove('hidden');
            let overlapText = "No good meeting time found.";
            
            // Find the perfect time when everyone's available
            for(let h=0; h<24; h++) {
                let testDate = new Date(baseDate);
                testDate.setHours(h);
                let allWorking = state.every(c => {
                    const h24 = parseInt(new Intl.DateTimeFormat('en-GB', { timeZone: c.tz, hour: 'numeric', hour12: false }).format(testDate));
                    return h24 >= 9 && h24 < 18;
                });
                if(allWorking) {
                    overlapText = `Perfect! Everyone's free around ${h}:00 your time.`;
                    break;
                }
            }
            document.getElementById('window-status').innerText = overlapText;
        }

        function updateTheme() {
            const hour = parseInt(hIn.value);
            let colors = ['#000', '#1a1a1a'];
            if(hour >= 5 && hour < 11) colors = ['#1e3a8a', '#000']; // Morning
            else if(hour >= 11 && hour < 17) colors = ['#111', '#111']; // Day
            else if(hour >= 17 && hour < 20) colors = ['#4c1d95', '#1a1a1a']; // Sunset
            document.body.style.background = `radial-gradient(circle at center, ${colors[0]} 0%, ${colors[1]} 100%)`;
        }

        // --- INTERACTION ---
        searchInput.oninput = () => {
            const val = searchInput.value.toLowerCase();
            searchResults.innerHTML = '';
            if(!val) { searchResults.classList.add('hidden'); return; }
            
            const filtered = CITIES_DB.filter(c => c.n.toLowerCase().includes(val)).slice(0, 5);
            if(filtered.length) {
                searchResults.classList.remove('hidden');
                filtered.forEach(c => {
                    const div = document.createElement('div');
                    div.className = "px-6 py-4 hover:bg-white/5 cursor-pointer text-xs font-bold border-b border-white/5 last:border-0";
                    div.innerText = `${c.n}, ${c.c}`;
                    div.onclick = () => {
                        state.push(c);
                        searchInput.value = '';
                        searchResults.classList.add('hidden');
                        render();
                    };
                    searchResults.appendChild(div);
                });
            } else { searchResults.classList.add('hidden'); }
        };

        function removeCity(idx) { state.splice(idx, 1); render(); }
        function clearAll() { state = []; render(); }
        
        document.getElementById('sync-btn').onclick = () => {
            const now = new Date();
            hIn.value = String(now.getHours()).padStart(2, '0');
            mIn.value = String(now.getMinutes()).padStart(2, '0');
            render();
        };

        document.getElementById('format-toggle').onclick = () => {
            is24h = !is24h;
            document.getElementById('toggle-circle').style.transform = is24h ? "translateX(20px)" : "translateX(0px)";
            render();
        };

        // --- DRAG & DROP ---
        cityList.addEventListener('dragover', e => {
            e.preventDefault();
            const dragging = document.querySelector('.dragging');
            const afterElement = [...cityList.querySelectorAll('div:not(.dragging)')].reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = e.clientY - box.top - box.height / 2;
                if(offset < 0 && offset > closest.offset) return { offset, element: child };
                else return closest;
            }, { offset: Number.NEGATIVE_INFINITY }).element;
            if (afterElement == null) cityList.appendChild(dragging);
            else cityList.insertBefore(dragging, afterElement);
        });

        hIn.oninput = render; mIn.oninput = render;
        document.addEventListener('click', (e) => { if(!e.target.closest('#city-search')) searchResults.classList.add('hidden'); });

        // --- INIT ---
        document.getElementById('sync-btn').click();
    </script>
</body>
</html>
